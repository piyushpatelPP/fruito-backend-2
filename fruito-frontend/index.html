<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#f8f8fa" />
    
    <!-- Preconnect for Google Fonts & Scripts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <title>fruito-frontend</title>
  </head>
  <body>
    <!-- Initial Loader (Appears instantly on slow networks before React boots) -->
    <div id="root">
      <style>
        .initial-loader { display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #f8f8fa; flex-direction: column; gap: 16px; }
        .initial-spinner { width: 40px; height: 40px; border: 4px solid rgba(248, 95, 0, 0.15); border-top-color: #f85f00; border-radius: 50%; animation: initial-spin 0.8s linear infinite; }
        @keyframes initial-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      </style>
      <div class="initial-loader">
        <div class="initial-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
