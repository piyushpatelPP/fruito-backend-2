spring.application.name=fruito-backend

# =========================
# PORT (Railway)
# =========================
server.port=${PORT:8080}

# =========================
# DATABASE (Railway auto variables)
# =========================

spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =========================
# CLOUDINARY (ENV VARIABLES)
# =========================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# =========================
# RAZORPAY (ENV VARIABLES)
# =========================
razorpay.key-id=${RAZORPAY_KEY:}
razorpay.key-secret=${RAZORPAY_SECRET:}

# =========================
# JWT
# =========================
jwt.private-key=${JWT_PRIVATE_KEY:}
jwt.public-key=${JWT_PUBLIC_KEY:}
# 1 hour in milliseconds
jwt.expiry-ms=3600000

# =========================
# GOOGLE OAUTH2
# =========================
google.client-id=${GOOGLE_CLIENT_ID:}

# =========================
# LOGGING (SAFE)
# =========================
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR

# =========================
# SEO
# =========================
# Set this to your actual frontend domain (no trailing slash)
# Override in Railway: SEO_FRONTEND_URL=https://yourfruito.com
seo.frontend-url=${SEO_FRONTEND_URL:https://fruito.store}
